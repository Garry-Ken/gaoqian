<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b1b2e"/>
      <stop offset="1" stop-color="#08080c"/>
    </linearGradient>
    <linearGradient id="gold" x1="120" y1="90" x2="420" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f9df8b"/>
      <stop offset="0.5" stop-color="#e9b949"/>
      <stop offset="1" stop-color="#c78a1e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <!-- rising breakout line: flat then explosive spike (non-linear 爆发) -->
  <path d="M96 372 L176 356 L232 336 L288 300 L332 344 L416 132" stroke="url(#gold)" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9" filter="url(#glow)"/>
  <circle cx="416" cy="132" r="17" fill="#fff3c4"/>
  <!-- ¥ mark -->
  <g filter="url(#glow)">
    <path d="M175 150 L232 250 L289 150" stroke="url(#gold)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M232 244 L232 372" stroke="url(#gold)" stroke-width="30" stroke-linecap="round" fill="none"/>
    <path d="M186 286 L278 286" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
    <path d="M186 330 L278 330" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
  </g>
</svg>
